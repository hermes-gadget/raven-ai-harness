# Raven Agent 0.3.0 configuration reference.
# Copy to ~/.config/raven/config.yaml. Legacy ~/.odin/config.yaml and
# ODIN_CONFIG are read as compatibility fallbacks.

general:
  instance_name: raven
  # Defaults to ~/.raven-agent when omitted.
  data_dir: ~/.raven-agent
  log_level: info
  debug: false

models:
  default_provider: local
  default_model: qwen2.5-coder
  planning_model: qwen2.5-coder
  critique_model: qwen2.5-coder
  # escalation_model: stronger-model
  providers:
    local:
      provider_type: openai_compat
      base_url: http://localhost:11434/v1
      default_model: qwen2.5-coder
      headers: {}
      timeout_secs: 120
      max_retries: 3
      fallback_chain: []
      health_check_interval_secs: 0
      circuit_breaker_threshold: 0

    # hosted:
    #   provider_type: openai_compat
    #   base_url: https://api.example.com/v1
    #   api_key_env: HOSTED_PROVIDER_API_KEY
    #   default_model: model-name
    #   headers: {}
    #   timeout_secs: 120
    #   max_retries: 3
    #   fallback_chain: [local]
    #   health_check_interval_secs: 30
    #   circuit_breaker_threshold: 3

agent:
  max_iterations: 100
  max_tool_calls_per_turn: 10
  confidence_threshold: 0.5
  max_retries: 3
  enable_decomposition: true
  enable_summarization: true
  context_limit: 32768
  compression_ratio: 0.5
  skills_dir: ~/.config/raven/skills

tools:
  enabled:
    - file_read
    - file_write
    - shell
    - web_search
    - web_fetch
    - git
  # Disabled names override enabled names. Discovered MCP tool names can also
  # be disabled here.
  disabled: []
  default_timeout_secs: 60
  path_boundary:
    allowed_read: ["."]
    allowed_write: ["."]
    denied:
      - .git
      - .env
      - ~/.ssh
  sandbox_enabled: false
  tool_dirs: []

  # External MCP tools fail closed by default.
  mcp_servers:
    # - name: filesystem
    #   command: npx
    #   args: ["-y", "@modelcontextprotocol/server-filesystem", "."]
    #   transport_type: stdio
    #   env: {}
    #   enabled: true
    #   tags: [mcp, external, dangerous]
    #   requires_approval: true
    #   safe: false

memory:
  enabled: true
  db_path: ~/.raven-agent/memory.db
  max_entries: 1000
  save_interval_secs: 300

safety:
  # Approval-required model tool calls fail closed because 0.3.0 has no
  # interactive approval responder in the loop.
  require_approval: true
  dangerous_commands:
    - 'rm\s+-rf'
    - 'git\s+reset\s+--hard'
    - 'git\s+push\s+--force'
    - 'sudo\s+'
    - 'chmod\s+777'
    - '>\s*/dev/'
    - 'mkfs\.'
    - 'dd\s+if='
  max_rate_per_minute: 60
  permissions:
    - tool_name: shell
      action: ask_user
      require_approval: true
      max_rate_per_minute: 10

audit:
  enabled: true
  log_path: ~/.raven-agent/audit.jsonl
  json_format: true

gateway:
  http_enabled: false
  http_addr: 127.0.0.1:9177
  discord_enabled: false
  # discord_token: direct-value-is-discouraged
  discord_token_env: DISCORD_BOT_TOKEN

# `raven schedule host` runs continuously only when enabled.
scheduler:
  enabled: false
  check_interval_secs: 30
  max_concurrent: 5
  db_path: ~/.raven-agent/scheduler.db
